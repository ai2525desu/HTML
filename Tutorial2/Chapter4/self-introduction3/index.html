<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>自己紹介Gridレイアウトバージョン</title>
        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <div id="profile-card" class="self-introduction">
            <h1 class="self-introduction__title">フルネーム</h1>
            <!-- 自己紹介に適した画像がなかったので、いったんPC画像+HTML練習のためcss直接表記  -->
            <img
                class="self-introduction__profile-img"
                src="images/pc_green.png"
                alt="フルネームのプロフィール画像"
            />
            <div class="self-introduction__text">
                <p class="self-introduction__content">
                    はじめまして。○○や○○の経験を経て、エンジニアを目指している「名前の
                    フルネーム」です。
                </p>
                <p class="self-introduction__content">
                    趣味はゲームです。中でもFPSが大好きです。
                </p>
            </div>
            <div class="social-section">
                <h2 class="social-section__title">SNS&Link</h2>
                <ul class="social-section__links">
                    <!-- GitHubのみ表記 -->
                    <li class="social-section__item">
                        <a
                            class="social-section__link"
                            href="https://github.com/ai2525desu"
                            target="_blank"
                        >
                            GitHub
                        </a>
                    </li>
                    <li class="social-section__item">
                        <a
                            class="social-section__link"
                            href="#"
                            target="_blank"
                        >
                            X
                        </a>
                    </li>
                    <li class="social-section__item">
                        <a
                            class="social-section__link"
                            href="#"
                            target="_blank"
                        >
                            ブログ
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </body>
</html>
